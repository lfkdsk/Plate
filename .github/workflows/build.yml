name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # PlateCore is the pure-Swift library — building/testing it doesn't need
  # xcodegen or the .app target, so this job runs fast and gates the rest.
  test-core:
    name: PlateCore tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: swift test
        run: swift test --enable-code-coverage

  # Debug build verifies the AppKit target compiles. We skip codesigning so
  # the job works without secrets — the .app it produces isn't shippable but
  # confirms the whole project graph still wires up.
  build-debug:
    name: PlateApp (Debug)
    needs: test-core
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen + xcbeautify
        run: brew install xcodegen xcbeautify
      - name: Generate Xcode project
        working-directory: PlateApp
        run: xcodegen generate
      - name: xcodebuild Debug
        working-directory: PlateApp
        # pipefail so a failure in xcodebuild propagates out of the
        # `| xcbeautify` pipe — without it, xcbeautify's exit code wins and
        # red builds masquerade as green.
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -project PlateApp.xcodeproj \
            -scheme PlateApp \
            -configuration Debug \
            -destination 'platform=macOS' \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
        env:
          NSUnbufferedIO: YES

  # Release build produces the actual .app and uploads it as a workflow
  # artifact. On tag pushes (v*), the .app is also attached to a GitHub
  # Release for distribution.
  build-release:
    name: PlateApp (Release)
    needs: test-core
    runs-on: macos-15
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        working-directory: PlateApp
        run: xcodegen generate

      - name: xcodebuild Release
        working-directory: PlateApp
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -project PlateApp.xcodeproj \
            -scheme PlateApp \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
        env:
          NSUnbufferedIO: YES

      - name: Zip Plate.app
        working-directory: PlateApp/build/Build/Products/Release
        run: |
          # ditto preserves resource forks / extended attributes that plain
          # `zip` strips — important for .app bundles to launch on macOS.
          ditto -c -k --keepParent Plate.app Plate.zip
          ls -la Plate.zip
          echo "Size: $(du -h Plate.zip | cut -f1)"

      - name: Upload .app artifact (90 days)
        uses: actions/upload-artifact@v4
        with:
          name: Plate-${{ github.sha }}
          path: PlateApp/build/Build/Products/Release/Plate.zip
          retention-days: 90

      - name: Attach to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: PlateApp/build/Build/Products/Release/Plate.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
