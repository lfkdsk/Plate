name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # PlateCore is the pure-Swift library — building/testing it doesn't need
  # xcodegen or the .app target, so this job runs fast and gates the rest.
  test-core:
    name: PlateCore tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: swift test
        run: swift test --enable-code-coverage

  # Debug build verifies the AppKit target compiles. We skip codesigning so
  # the job works without secrets — the .app it produces isn't shippable but
  # confirms the whole project graph still wires up.
  build-debug:
    name: PlateApp (Debug)
    needs: test-core
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen + xcbeautify
        run: brew install xcodegen xcbeautify
      - name: Generate Xcode project
        working-directory: PlateApp
        run: xcodegen generate
      - name: xcodebuild Debug
        working-directory: PlateApp
        # pipefail so a failure in xcodebuild propagates out of the
        # `| xcbeautify` pipe — without it, xcbeautify's exit code wins and
        # red builds masquerade as green.
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -project PlateApp.xcodeproj \
            -scheme PlateApp \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
        env:
          NSUnbufferedIO: YES

      # Upload the built .app on every run — including pull requests, which the
      # Release job skips. ditto (not plain zip) preserves the bundle's
      # extended attributes so it still launches after download.
      - name: Zip Plate.app
        working-directory: PlateApp/build/Build/Products/Debug
        run: ditto -c -k --keepParent Plate.app Plate.zip

      - name: Upload Debug .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Plate-Debug-${{ github.sha }}
          path: PlateApp/build/Build/Products/Debug/Plate.zip
          retention-days: 30

  # Release builds the shippable per-architecture artifacts. The macos-15
  # runner is Apple Silicon, so x86_64 is cross-compiled (ARCHS / --arch — the
  # SDK carries both slices). arm64 and x86_64 are built *separately* (not a
  # lipo'd universal binary). Each arch produces:
  #   - Plate-macos-<arch>.zip          the .app, ad-hoc signed
  #   - plate-cli-macos-<arch>.tar.gz   the CLI + its PlateCore resource bundle
  # each with a .sha256 sidecar, uploaded as workflow artifacts. On a v* tag the
  # separate publish-release job collects them into one GitHub Release.
  build-release:
    name: Release (${{ matrix.arch }})
    needs: test-core
    runs-on: macos-15
    if: github.event_name != 'pull_request'
    strategy:
      # Don't let one arch failing cancel the other — we want whichever
      # slice built so a partial release is still possible.
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen + xcbeautify
        run: brew install xcodegen xcbeautify

      # ---- macOS .app (this arch) ----
      - name: Generate Xcode project
        working-directory: PlateApp
        run: xcodegen generate

      - name: xcodebuild Release (${{ matrix.arch }})
        working-directory: PlateApp
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -project PlateApp.xcodeproj \
            -scheme PlateApp \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            ARCHS=${{ matrix.arch }} \
            ONLY_ACTIVE_ARCH=NO \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify
        env:
          NSUnbufferedIO: YES

      - name: Ad-hoc sign + zip Plate.app (${{ matrix.arch }})
        working-directory: PlateApp/build/Build/Products/Release
        shell: bash
        run: |
          set -euo pipefail
          # Apple Silicon refuses to launch a fully-unsigned binary; an ad-hoc
          # signature is the minimum that runs (mirrors the local release flow).
          codesign --force --deep --sign - Plate.app
          codesign --verify --deep --strict Plate.app
          # ditto (not plain zip) keeps the bundle's extended attributes intact.
          ZIP="Plate-macos-${{ matrix.arch }}.zip"
          ditto -c -k --keepParent Plate.app "$ZIP"
          shasum -a 256 "$ZIP" > "$ZIP.sha256"
          echo "Built $ZIP ($(du -h "$ZIP" | cut -f1))"

      # ---- plate-cli (this arch) ----
      - name: Build + package plate-cli (${{ matrix.arch }})
        shell: bash
        run: |
          set -euo pipefail
          swift build -c release --arch ${{ matrix.arch }} --product plate-cli
          BIN="$(swift build -c release --arch ${{ matrix.arch }} --show-bin-path)"

          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/plate-cli"
          cp "$BIN/plate-cli" "$STAGE/plate-cli/"
          # `serve` loads gallery.html from the PlateCore resource bundle that
          # SwiftPM emits next to the binary — ship it alongside the CLI.
          if [ -d "$BIN/Plate_PlateCore.bundle" ]; then
            cp -R "$BIN/Plate_PlateCore.bundle" "$STAGE/plate-cli/"
          fi
          # ad-hoc sign so Apple Silicon will execute it.
          codesign --force --sign - "$STAGE/plate-cli/plate-cli"

          TAR="plate-cli-macos-${{ matrix.arch }}.tar.gz"
          tar -C "$STAGE" -czf "$TAR" plate-cli
          shasum -a 256 "$TAR" > "$TAR.sha256"
          echo "Built $TAR ($(du -h "$TAR" | cut -f1))"

      # ---- upload (the publish-release job turns these into the Release) ----
      - name: Upload artifacts (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: Plate-macos-${{ matrix.arch }}
          path: |
            PlateApp/build/Build/Products/Release/Plate-macos-${{ matrix.arch }}.zip
            PlateApp/build/Build/Products/Release/Plate-macos-${{ matrix.arch }}.zip.sha256
            plate-cli-macos-${{ matrix.arch }}.tar.gz
            plate-cli-macos-${{ matrix.arch }}.tar.gz.sha256
          retention-days: 90

  # A single job attaches every arch's artifacts to one GitHub Release. Keeping
  # this out of the build matrix avoids two runners racing to create the same
  # release, and means only this job needs `contents: write` (the matrix builds
  # stay read-only). Runs on Linux — it only moves files, no Xcode needed.
  publish-release:
    name: Publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Plate-macos-*
          path: dist
          merge-multiple: true

      # upload-artifact keeps each artifact's nested path (e.g. PlateApp/build/
      # …/Plate-macos-arm64.zip). Flatten every file into one dir so the
      # release upload is a simple, unambiguous glob — all 8 basenames are
      # unique, so nothing collides.
      - name: Flatten into a release dir
        run: |
          mkdir -p out
          find dist -type f -exec cp {} out/ \;
          ls -la out

      - name: Create / update the Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
