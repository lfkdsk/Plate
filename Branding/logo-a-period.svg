<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- "P." — editorial book-plate mark. Bold serif P with a coral period,
       referencing the "Plate I / Plate II" convention in fine-art publishing.
       Reads at 16×16 (silhouette of P), bloom at 1024 (coral accent dot). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#231D1A"/>
      <stop offset="1" stop-color="#15110F"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <text x="440" y="770"
        text-anchor="middle"
        font-family="'Iowan Old Style', Charter, Georgia, 'Times New Roman', serif"
        font-size="760"
        font-weight="700"
        fill="#E8DDD0">P</text>
  <circle cx="710" cy="720" r="48" fill="#D97757"/>
</svg>
