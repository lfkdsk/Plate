<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>__LIBRARY_NAME__ · Plate</title>
<style>
  :root {
    --bg:#1A1614; --surface:#211C19; --raised:#2A241F; --sel:#342D27;
    --text:#EDE4D3; --muted:#B3A896; --subtle:#8A7F6F; --faint:#5A5147;
    --accent:#D97757; --hairline:#342D27;
    --serif:"New York",Georgia,"Times New Roman",serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
    --sys:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--text); font-family:var(--sys);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  body.locked { overflow:hidden; }

  .topbar {
    position:sticky; top:0; z-index:10;
    display:flex; align-items:baseline; justify-content:space-between; gap:16px;
    padding:14px 18px;
    background:color-mix(in srgb, var(--surface) 86%, transparent);
    backdrop-filter:saturate(140%) blur(14px);
    -webkit-backdrop-filter:saturate(140%) blur(14px);
    border-bottom:1px solid var(--hairline);
  }
  .brand { display:flex; align-items:baseline; gap:12px; min-width:0; }
  .mark {
    font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--accent); padding-top:2px;
  }
  .libname {
    font-family:var(--serif); font-weight:500; font-size:22px; line-height:1.1;
    margin:0; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .meta {
    font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--subtle); white-space:nowrap;
  }

  main { padding:8px; }
  .grid { width:100%; }
  .row { display:flex; gap:4px; margin-bottom:4px; overflow:hidden; }
  .cell {
    position:relative; flex:0 0 auto; background:var(--surface);
    overflow:hidden; cursor:zoom-in; border-radius:2px;
  }
  .cell img { width:100%; height:100%; object-fit:cover; display:block; }
  .cell::after {
    content:""; position:absolute; inset:0; border-radius:2px;
    box-shadow:inset 0 0 0 1px transparent; transition:box-shadow .12s ease;
  }
  .cell:hover::after { box-shadow:inset 0 0 0 2px var(--accent); }
  .fav {
    position:absolute; top:6px; right:7px; color:var(--accent); font-size:13px;
    text-shadow:0 1px 3px rgba(0,0,0,.7); pointer-events:none;
  }
  /* Bottom-left media marker: "▶ 0:12" for video, "◉ LIVE" for a Live Photo. */
  .badge {
    position:absolute; left:6px; bottom:6px; pointer-events:none;
    font-family:var(--mono); font-size:10px; letter-spacing:.04em;
    color:var(--text); background:rgba(0,0,0,.58);
    padding:2px 6px; border-radius:3px;
  }

  .empty {
    font-family:var(--serif); font-style:italic; color:var(--subtle);
    text-align:center; padding:18vh 20px; font-size:18px;
  }

  .lightbox {
    position:fixed; inset:0; z-index:50; display:flex;
    align-items:center; justify-content:center;
    background:rgba(12,9,8,.965); backdrop-filter:blur(4px);
  }
  .lightbox[hidden] { display:none; }
  .lb-stage {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:40px 64px 86px; min-width:0; min-height:0;
  }
  .lb-stage img, .lb-stage video {
    max-width:92vw; max-height:82vh; object-fit:contain;
    box-shadow:0 24px 60px rgba(0,0,0,.6); border-radius:2px;
  }
  .lb-stage video { background:#000; }
  .lb-stage img[hidden], .lb-stage video[hidden] { display:none; }
  .lb-nav {
    position:fixed; top:0; bottom:0; width:64px; border:0; background:transparent;
    color:var(--faint); font-size:40px; cursor:pointer; transition:color .12s ease;
    display:flex; align-items:center; justify-content:center; z-index:2;
  }
  .lb-nav:hover { color:var(--text); }
  .lb-prev { left:0; } .lb-next { right:0; }
  .lb-close {
    position:fixed; top:14px; right:18px; width:34px; height:34px; border:0; border-radius:50%;
    background:var(--raised); color:var(--muted); font-size:15px; cursor:pointer;
    /* Above the full-height nav strips so the click isn't stolen by lb-next. */
    z-index:4;
  }
  .lb-close:hover { color:var(--text); background:var(--sel); }
  .lb-info {
    position:fixed; left:0; right:0; bottom:0; padding:14px 18px 18px;
    text-align:center;
    background:linear-gradient(to top, rgba(12,9,8,.92), transparent);
  }
  .lb-line {
    font-family:var(--mono); font-size:11.5px; letter-spacing:.04em;
    color:var(--muted); margin-bottom:8px;
  }
  .lb-line .sep { color:var(--faint); margin:0 8px; }
  .dl {
    font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--accent); text-decoration:none; border:1px solid var(--accent);
    padding:5px 12px; border-radius:999px; transition:all .12s ease;
  }
  .dl:hover { background:var(--accent); color:var(--bg); }
  .lb-actions { display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center; }
  .dl-label { font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--subtle); }

  @media (max-width:560px) {
    .lb-stage { padding:24px 8px 86px; } .lb-nav { width:44px; font-size:30px; }
    .libname { font-size:18px; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="mark">Plate</span>
      <h1 class="libname">__LIBRARY_NAME__</h1>
    </div>
    <div class="meta"><span id="count">Loading…</span></div>
  </header>

  <main>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" hidden>No photos in this library yet.</div>
    <div id="error" class="empty" hidden>Couldn’t load the library.</div>
  </main>

  <div id="lightbox" class="lightbox" hidden>
    <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">‹</button>
    <button class="lb-nav lb-next" id="lbNext" aria-label="Next">›</button>
    <div class="lb-stage"><img id="lbImg" alt=""><video id="lbVideo" playsinline controls hidden></video></div>
    <div class="lb-info" id="lbInfo"></div>
  </div>

<script>
(function(){
  "use strict";
  // Propagate ?key= (if the page was opened with one) onto every subresource
  // URL. When absent, same-origin Basic-auth credentials carry through.
  var KEY = new URLSearchParams(location.search).get("key");
  function withKey(p){ return KEY ? p + (p.indexOf("?")>=0?"&":"?") + "key=" + encodeURIComponent(KEY) : p; }
  function thumbURL(id){ return withKey("/thumb/"+id); }
  function previewURL(id){ return withKey("/preview/"+id); }
  function originalURL(id){ return withKey("/original/"+id); }
  function motionURL(id){ return withKey("/motion/"+id); }

  var grid = document.getElementById("grid");
  var countEl = document.getElementById("count");
  var emptyEl = document.getElementById("empty");
  var errorEl = document.getElementById("error");
  var lb = document.getElementById("lightbox");
  var lbImg = document.getElementById("lbImg");
  var lbVideo = document.getElementById("lbVideo");
  var lbInfo = document.getElementById("lbInfo");

  var GAP = 4, TARGET = 240;
  var items = [], current = -1;

  var ENTITIES = { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" };
  function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return ENTITIES[c]; }); }
  function fmtShutter(s){ if(!s) return null; return s>=1 ? (Math.round(s*10)/10)+"s" : "1/"+Math.round(1/s)+"s"; }
  function fmtDate(secs){ if(!secs) return null; try { return new Date(secs*1000).toLocaleString(); } catch(e){ return null; } }
  function fmtDuration(secs){ var t=Math.max(0,Math.round(secs||0)); var m=Math.floor(t/60); var s=t%60; return m+":"+(s<10?"0":"")+s; }

  // Greedy justified layout — same shape as the app's JustifiedGridLayout:
  // accumulate aspect·TARGET (+ gaps) until the row would overflow, then
  // scale that row's height so it fills exactly; the last row keeps TARGET.
  function layout(){
    if(!items.length) return;
    var cw = grid.clientWidth;
    if(cw <= 0) return;
    var frag = document.createDocumentFragment();
    var row = [], aspectSum = 0;

    function flush(isLast){
      if(!row.length) return;
      var gaps = GAP*(row.length-1);
      var h = isLast ? TARGET : (cw - gaps)/aspectSum;
      var rowEl = document.createElement("div");
      rowEl.className = "row";
      rowEl.style.height = Math.round(h)+"px";
      for(var j=0;j<row.length;j++){
        var it = row[j];
        var aspect = (it.h>0)? it.w/it.h : 1;
        var cell = document.createElement("div");
        cell.className = "cell";
        cell.style.width = Math.round(aspect*h)+"px";
        cell.dataset.index = it._i;
        var img = document.createElement("img");
        img.loading = "lazy"; img.decoding = "async";
        img.src = thumbURL(it.id); img.alt = it.filename || "";
        cell.appendChild(img);
        if(it.favorite){
          var f = document.createElement("span"); f.className="fav"; f.textContent="♥";
          cell.appendChild(f);
        }
        if(it.kind === "video" || it.kind === "livePhoto"){
          var bd = document.createElement("span"); bd.className = "badge";
          bd.textContent = (it.kind === "video")
            ? "▶ " + (it.duration ? fmtDuration(it.duration) : "")
            : "◉ LIVE";
          cell.appendChild(bd);
        }
        rowEl.appendChild(cell);
      }
      frag.appendChild(rowEl);
      row = []; aspectSum = 0;
    }

    for(var i=0;i<items.length;i++){
      var it = items[i]; it._i = i;
      var aspect = (it.h>0)? it.w/it.h : 1;
      row.push(it); aspectSum += aspect;
      if(aspectSum*TARGET + GAP*(row.length-1) >= cw) flush(false);
    }
    flush(true);
    grid.innerHTML = "";
    grid.appendChild(frag);
  }

  var resizeTimer = null;
  window.addEventListener("resize", function(){
    clearTimeout(resizeTimer); resizeTimer = setTimeout(layout, 120);
  });

  grid.addEventListener("click", function(e){
    var cell = e.target.closest(".cell");
    if(cell) openLightbox(parseInt(cell.dataset.index,10));
  });

  function openLightbox(i){
    if(i<0 || i>=items.length) return;
    current = i; render(); lb.hidden = false; document.body.classList.add("locked");
  }
  function closeLightbox(){
    lb.hidden = true; lbImg.removeAttribute("src"); stopVideo();
    document.body.classList.remove("locked"); current = -1;
  }

  // Pause + unload the <video> and return to the still surface. Clearing src
  // (not just pause) stops the network stream when navigating away.
  function stopVideo(){
    lbVideo.pause();
    lbVideo.removeAttribute("src");
    lbVideo.load();
    lbVideo.hidden = true;
    lbImg.hidden = false;
  }
  // Swap the stage to the <video>, play `src`. `loopOnce`=false leaves the last
  // frame up at the end (Live Photo motion swaps back to the still instead).
  function playVideo(src, isLiveMotion){
    lbImg.hidden = true;
    lbVideo.hidden = false;
    lbVideo.dataset.live = isLiveMotion ? "1" : "";
    lbVideo.src = src;
    lbVideo.currentTime = 0;
    var p = lbVideo.play();
    if(p && p.catch) p.catch(function(){ /* autoplay may be blocked; controls remain */ });
  }
  function step(d){
    if(current<0) return;
    var n = current + d;
    if(n<0 || n>=items.length) return;
    current = n; render();
  }

  function render(){
    var it = items[current];
    // Pick the stage surface: video plays the original inline; image and Live
    // Photo show the still (Live Photo gets a "◉ Live" button to play motion).
    stopVideo();
    if(it.kind === "video"){
      playVideo(originalURL(it.id), false);
    } else {
      lbImg.src = previewURL(it.id);
    }
    var parts = [];
    if(it.camera) parts.push(esc(it.camera));
    if(it.lens) parts.push(esc(it.lens));
    var tech = [];
    if(it.focal) tech.push(Math.round(it.focal)+"mm");
    if(it.aperture) tech.push("f/"+(Math.round(it.aperture*10)/10));
    var sh = fmtShutter(it.shutter); if(sh) tech.push(sh);
    if(it.iso) tech.push("ISO "+it.iso);
    if(tech.length) parts.push(tech.join("  ·  "));
    var d = fmtDate(it.captured); if(d) parts.push(esc(d));
    if(it.kind === "video" && it.duration) parts.push(fmtDuration(it.duration));
    if(it.format) parts.push(esc(it.format));
    // One download button per file: the display master (HEIF/JPEG/movie) plus
    // every RAW companion (.3FR, .NEF, …) and sidecar (.XMP/.AAE). The server
    // sets Content-Disposition so each saves with its real filename.
    var dls = '<span class="dl-label">Download</span>';
    dls += '<a class="dl" href="'+originalURL(it.id)+'" download="'+esc(it.filename||"")+'">'+(it.ext ? esc(it.ext.toUpperCase()) : 'Original')+'</a>';
    (it.raws || []).forEach(function(ext, i){
      dls += '<a class="dl" href="'+withKey('/raw/'+it.id+'/'+i)+'">'+esc(ext.toUpperCase())+'</a>';
    });
    (it.sidecars || []).forEach(function(ext, i){
      dls += '<a class="dl" href="'+withKey('/sidecar/'+it.id+'/'+i)+'">'+esc(ext.toUpperCase())+'</a>';
    });
    // Live Photo: play the motion clip in place (swaps back to the still when done).
    var live = (it.kind === "livePhoto")
      ? '<button class="dl" type="button" id="livePlay">◉ Live</button>' : '';
    lbInfo.innerHTML = '<div class="lb-line">'+parts.join('<span class="sep">·</span>')+'</div><div class="lb-actions">'+live+dls+'</div>';
  }

  document.getElementById("lbClose").addEventListener("click", closeLightbox);
  document.getElementById("lbPrev").addEventListener("click", function(){ step(-1); });
  document.getElementById("lbNext").addEventListener("click", function(){ step(1); });
  // "◉ Live" button (rebuilt each render) — delegate off the info bar.
  lbInfo.addEventListener("click", function(e){
    if(e.target && e.target.id === "livePlay" && current >= 0){
      playVideo(motionURL(items[current].id), true);
    }
  });
  // Live Photo motion plays once, then reveals the still again.
  lbVideo.addEventListener("ended", function(){
    if(lbVideo.dataset.live === "1") stopVideo();
  });
  lb.addEventListener("click", function(e){
    if(e.target===lb || e.target.classList.contains("lb-stage")) closeLightbox();
  });
  window.addEventListener("keydown", function(e){
    if(lb.hidden) return;
    if(e.key==="Escape") closeLightbox();
    else if(e.key==="ArrowLeft") step(-1);
    else if(e.key==="ArrowRight") step(1);
  });

  fetch(withKey("/api/assets"), {cache:"no-store"})
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(data){
      items = data.assets || [];
      var n = data.count || 0;
      countEl.textContent = n + (n===1 ? " photo" : " photos");
      if(!items.length){ emptyEl.hidden = false; return; }
      layout();
    })
    .catch(function(){ countEl.textContent = ""; errorEl.hidden = false; });
})();
</script>
</body>
</html>
